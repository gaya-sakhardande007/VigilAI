databases:
  - name: vigil-ai-db
    databaseName: vigil_ai
    user: vigil_ai

services:
  - type: web
    name: vigil-ai
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vigil-ai-db
          property: connectionString